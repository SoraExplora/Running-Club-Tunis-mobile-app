name: rct_connect
description: A new Flutter project for the Running Club Tunis.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  webview_flutter: ^4.7.0
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^6.0.0
  tutorial_coach_mark: ^1.2.11
  
  flutter_local_notifications: ^20.0.0
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  url_launcher: ^6.3.2
  universal_html: ^2.3.0
  
  # AI & Accessibility
  google_generative_ai: ^0.4.0
  speech_to_text: ^6.6.0
  flutter_tts: ^4.2.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/